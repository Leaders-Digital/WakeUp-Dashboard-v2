name: Build and Deploy Frontend

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: bangov2
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            bangov2/wakeup-dashboard:latest
          build-args: |
            REACT_APP_API_KEY=${{ secrets.REACT_APP_API_KEY }}
            REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}
      
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Create wakeup-dashboard directory if it doesn't exist
            mkdir -p /home/ubuntu/wakeup-dashboard
            
            # Create docker-compose.yml for wakeup-dashboard
            cat > /home/ubuntu/wakeup-dashboard/docker-compose.yml << 'EOF'
            version: '3.8'
            
            services:
              wakeup-frontend:
                image: bangov2/wakeup-dashboard:latest
                container_name: wakeup-dashboard
                ports:
                  - "3209:3000"
                restart: unless-stopped
                networks:
                  - wakeup-network
            
            networks:
              wakeup-network:
                driver: bridge
            EOF
            
            # Stop any existing wakeup-dashboard containers that might conflict
            sudo docker stop wakeup-dashboard 2>/dev/null || true
            sudo docker rm wakeup-dashboard 2>/dev/null || true
            
            # Navigate to wakeup-dashboard directory
            cd /home/ubuntu/wakeup-dashboard
            
            # Stop and remove only wakeup-dashboard containers
            sudo docker compose down --remove-orphans
            
            # Pull the latest wakeup-dashboard image
            sudo docker compose pull
            
            # Start wakeup-dashboard service
            sudo docker compose up -d
            
            # Show running containers for verification
            sudo docker ps | grep wakeup